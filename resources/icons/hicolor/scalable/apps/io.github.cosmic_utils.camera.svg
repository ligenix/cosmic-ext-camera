<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#62a0ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5fb4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="camera" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square (~80% of canvas = 102x102, centered) -->
  <rect x="13" y="13" width="102" height="102" rx="25.5" fill="url(#bg)"/>

  <!-- Camera body (scaled ~0.91x from center 64,64) -->
  <path d="M 31.2 37 L 42.8 37 L 47.4 48 L 80.6 48 L 85.2 37 L 96.8 37 C 100.4 37 103.6 40.2 103.6 43.8 L 103.6 91.2 C 103.6 94.8 100.4 98 96.8 98 L 31.2 98 C 27.6 98 24.4 94.8 24.4 91.2 L 24.4 43.8 C 24.4 40.2 27.6 37 31.2 37 Z" fill="url(#camera)"/>

  <!-- Flash -->
  <rect x="33" y="40.6" width="10" height="4.6" rx="1" fill="#d4d4d4"/>

  <!-- Lens backing (fills gap between ring and lens with camera body color) -->
  <circle cx="64" cy="67.3" r="25.5" fill="url(#camera)"/>

  <!-- Outer ring (cyan) -->
  <circle cx="64" cy="67.3" r="25.5" fill="none" stroke="url(#ring)" stroke-width="5.5"/>

  <!-- Inner lens -->
  <circle cx="64" cy="67.3" r="20" fill="url(#lens)"/>

  <!-- Lens highlight -->
  <ellipse cx="58.5" cy="61.8" rx="5.5" ry="3.6" fill="#ffffff" opacity="0.3"/>
  <ellipse cx="62.2" cy="63.7" rx="2.7" ry="1.8" fill="#ffffff" opacity="0.5"/>
</svg>
